[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "php82Extensions.gd",
  "php82Extensions.bcmath",
  "php82Extensions.tokenizer",
  "php82Extensions.ctype",
  "php82Extensions.fileinfo",
  "php82Extensions.openssl",
  "nodejs_20",
  "nodePackages.npm"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install"
]

[phases.build]
cmds = [
  "echo 'Assets already built and committed to Git - skipping npm run build'"
]

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan migrate --force && php artisan db:seed --class=AdminSeeder --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"
